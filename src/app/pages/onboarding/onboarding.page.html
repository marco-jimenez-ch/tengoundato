<ion-content [fullscreen]="true" class="splash-content">

  <div class="splash">

    <!-- Logo / título -->
    <div class="splash-top">
      <p class="splash-eyebrow">Bienvenido a</p>
      <h1 class="splash-title">
        <span class="w-dark">Tengo</span><br>
        <span class="w-amber">Un</span><br>
        <span class="w-dark">Dato.</span>
      </h1>
      <p class="splash-sub">Oficios de confianza<br>en tu barrio</p>
    </div>

    <!-- Ilustración -->
    <div class="splash-illus">
      <img src="assets/slides/slide1.png" alt="maestro" />
    </div>

    <!-- Acciones -->
    <div class="splash-bottom">
      <button class="btn-primary" (click)="irARegistro()">
        Crear cuenta
      </button>
      <button class="btn-secondary" (click)="irALogin()">
        Ya tengo cuenta → Iniciar sesión
      </button>
    </div>

  </div>

</ion-content>
