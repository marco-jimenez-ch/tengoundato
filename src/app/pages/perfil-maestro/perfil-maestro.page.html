<ion-header>
  <ion-toolbar>
    <ion-title>Mi Perfil</ion-title>
    <ion-button slot="end" fill="clear" (click)="cerrarSesion()">
      <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
    </ion-button>
  </ion-toolbar>

  <!-- Foto de perfil con cámara -->
  <div class="pm-avatar-wrap">
    <div class="pm-avatar" (click)="tomarFoto()">
      <img *ngIf="fotoPerfil" [src]="fotoPerfil" alt="Foto de perfil" />
      <ion-icon *ngIf="!fotoPerfil" name="camera-outline" class="pm-camera-icon"></ion-icon>
    </div>
    <p class="pm-avatar-hint">Toca para cambiar foto</p>
  </div>

  <ion-toolbar>
    <ion-segment
      [value]="segmentoActivo"
      (ionChange)="cambiarSegmento($event)">
      <ion-segment-button value="mis-datos">
        <ion-label>Mis Datos</ion-label>
      </ion-segment-button>
      <ion-segment-button value="experiencia">
        <ion-label>Experiencia</ion-label>
      </ion-segment-button>
      <ion-segment-button value="certificaciones">
        <ion-label>Certificaciones</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  <app-mis-datos
    *ngIf="segmentoActivo === 'mis-datos'">
  </app-mis-datos>
  <app-experiencia-laboral
    *ngIf="segmentoActivo === 'experiencia'">
  </app-experiencia-laboral>
  <app-certificaciones
    *ngIf="segmentoActivo === 'certificaciones'">
  </app-certificaciones>
</ion-content>
