<ion-content class="pnf-content">
  <div class="pnf-wrap">

    <ion-icon name="alert-circle-outline" class="pnf-icon"></ion-icon>

    <h1 class="pnf-title">404</h1>
    <p class="pnf-sub">Página no encontrada</p>
    <p class="pnf-desc">
      La dirección que ingresaste no existe o fue movida.
    </p>

    <ion-button
      expand="block"
      shape="round"
      (click)="irAlHome()"
      class="pnf-btn">
      <ion-icon slot="start" name="home-outline"></ion-icon>
      Volver al inicio
    </ion-button>

  </div>
</ion-content>
