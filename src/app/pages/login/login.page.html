<ion-content [fullscreen]="true" class="tud-login-content">

  <!-- ── Fondo decorativo ─────────────────────────────────────────────── -->
  <div class="tud-bg-deco" aria-hidden="true">
    <div class="deco-circle deco-circle--1"></div>
    <div class="deco-circle deco-circle--2"></div>
  </div>

  <!-- ── Scroll principal ──────────────────────────────────────────────── -->
  <div class="tud-scroll-wrap">

    <!-- Logo -->
    <div class="tud-logo-area fadeUp">
      <p class="tud-wordmark">
        Tengo<span class="accent">Un</span>Dato
      </p>
      <p class="tud-tagline">El dato que necesitabas</p>
    </div>

    <!-- Card login -->
    <div class="tud-card fadeUpBig">

      <h1 class="tud-card__title">Bienvenido</h1>
      <p  class="tud-card__sub">Inicia sesión para continuar</p>

      <!-- Error global -->
      @if (errorMsg) {
        <div class="tud-error-pill" role="alert">
          <span class="error-icon">⚠</span>
          {{ errorMsg }}
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Campo email -->
        <div class="tud-field" [class.tud-field--error]="emailError">
          <label class="tud-label" for="email">Correo electrónico</label>
          <div class="tud-input-wrap">
            <svg class="tud-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="4" width="20" height="16" rx="3"/>
              <polyline points="2,4 12,13 22,4"/>
            </svg>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="correo@ejemplo.cl"
              inputmode="email"
              autocomplete="email"
              class="tud-input"
            />
          </div>
          @if (emailError) {
            <p class="tud-field-error">{{ emailError }}</p>
          }
        </div>

        <!-- Campo contraseña -->
        <div class="tud-field" [class.tud-field--error]="passwordError">
          <label class="tud-label" for="password">Contraseña</label>
          <div class="tud-input-wrap">
            <svg class="tud-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
              class="tud-input"
            />
            <button
              type="button"
              class="tud-toggle-pass"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
            >
              @if (showPassword) {
                <!-- ojo tachado -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <!-- ojo -->
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                  <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          @if (passwordError) {
            <p class="tud-field-error">{{ passwordError }}</p>
          }
        </div>

        <!-- ¿Olvidaste tu contraseña? -->
        <div class="tud-forgot-row">
          <button type="button" class="tud-link-btn" (click)="irARecuperacion()">
            ¿Olvidaste tu contraseña?
          </button>
        </div>

        <!-- Botón primario -->
        <button
          type="submit"
          class="tud-btn-primary"
          [disabled]="isLoading"
        >
          @if (isLoading) {
            <ion-spinner name="crescent" class="tud-spinner"></ion-spinner>
          } @else {
            Ingresar
          }
        </button>

      </form>

      <!-- Divisor -->
      <div class="tud-divider" aria-hidden="true">
        <span class="tud-divider__line"></span>
        <span class="tud-divider__text">o continúa con</span>
        <span class="tud-divider__line"></span>
      </div>

      <!-- Botón Google -->
      <button type="button" class="tud-btn-google" (click)="irAGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>

    </div><!-- /tud-card -->

    <!-- Footer registro -->
    <p class="tud-footer-link fadeUp">
      ¿No tienes cuenta?
      <button type="button" class="tud-link-btn tud-link-btn--amber" (click)="irARegistro()">
        Regístrate
      </button>
    </p>

  </div><!-- /tud-scroll-wrap -->

</ion-content>
